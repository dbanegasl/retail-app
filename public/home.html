<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data-Driven Retail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root { --accent:#0ea5e9; --accent2:#6366f1; --dark:#0f172a; }
        body { background: var(--dark); color: #e2e8f0; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
        .navbar-custom { background: rgba(15,23,42,.92); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,.06); }
        .navbar-custom .navbar-brand { font-weight: 700; color: #f1f5f9; }
        .navbar-custom .nav-link { color: #94a3b8; transition: color .3s; }
        .navbar-custom .nav-link:hover { color: var(--accent); }
        .hero-app { padding: 120px 0 60px; text-align: center; }
        .hero-app h1 {
            font-size: 3rem; font-weight: 800;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .status-btn {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none; color: #fff; padding: .75rem 2rem;
            border-radius: .75rem; font-weight: 600; font-size: 1.05rem;
            cursor: pointer; transition: all .3s;
        }
        .status-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(14,165,233,.3); }
        #status-output {
            max-width: 500px; margin: 1.5rem auto 0;
            background: rgba(255,255,255,.05);
            border: 1px solid rgba(255,255,255,.1);
            border-radius: .75rem; padding: 1rem;
            font-family: 'Cascadia Code', monospace; font-size: .9rem;
            color: #22c55e; display: none;
        }
        .feature-card {
            background: rgba(255,255,255,.04);
            border: 1px solid rgba(255,255,255,.08);
            border-radius: 1rem; padding: 1.5rem;
            transition: all .3s;
        }
        .feature-card:hover { border-color: rgba(14,165,233,.3); transform: translateY(-4px); }
        footer { border-top: 1px solid rgba(255,255,255,.06); padding: 1.5rem 0; color: #64748b; font-size: .85rem; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-custom fixed-top">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" href="../index.html">
            <i class="bi bi-arrow-left" style="color:var(--accent)"></i>
            <img src="https://cedia.edu.ec/wp-content/uploads/2022/06/LOGO-MARGEN-8.png" alt="CEDIA" style="height:26px;">
        </a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navHome">
            <i class="bi bi-list text-white fs-4"></i>
        </button>
        <div class="collapse navbar-collapse" id="navHome">
            <ul class="navbar-nav ms-auto gap-1">
                <li class="nav-item"><a class="nav-link" href="student.html">Sesión 1</a></li>
                <li class="nav-item"><a class="nav-link" href="student2.html">Sesión 2</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- Hero -->
<section class="hero-app">
    <div class="container">
        <h1 id="titulo">Data-Driven Retail</h1>
        <p class="text-secondary mt-3 mb-4" style="font-size:1.1rem;">Proyecto base del curso <strong style="color:var(--accent)">TMO CEDIA — DevOps + IA</strong></p>
        <button id="btn-estado" class="status-btn">
            <i class="bi bi-activity me-2"></i>Ver Estado
        </button>
        <div id="status-output"></div>
    </div>
</section>

<!-- Features -->
<section class="py-5">
    <div class="container">
        <div class="row g-4 justify-content-center" style="max-width:800px; margin:0 auto;">
            <div class="col-md-4">
                <div class="feature-card text-center">
                    <i class="bi bi-code-slash fs-2" style="color:var(--accent)"></i>
                    <h6 class="fw-bold mt-2">HTML + CSS + JS</h6>
                    <p class="text-secondary mb-0" style="font-size:.85rem;">Estructura web profesional</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="feature-card text-center">
                    <i class="bi bi-git fs-2" style="color:var(--accent2)"></i>
                    <h6 class="fw-bold mt-2">Git & GitHub</h6>
                    <p class="text-secondary mb-0" style="font-size:.85rem;">Control de versiones</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="feature-card text-center">
                    <i class="bi bi-gear-wide-connected fs-2" style="color:#22c55e"></i>
                    <h6 class="fw-bold mt-2">CI/CD</h6>
                    <p class="text-secondary mb-0" style="font-size:.85rem;">GitHub Actions Pipeline</p>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- Footer -->
<footer class="text-center">
    <div class="container">
        <a href="../index.html" class="text-decoration-none" style="color:var(--accent)">
            <i class="bi bi-arrow-left me-1"></i> Volver al inicio
        </a>
        <p class="mt-2 mb-0">&copy; 2026 Daniel Banegas · TMO CEDIA — DevOps + IA</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.getElementById('btn-estado').addEventListener('click', () => {
    const out = document.getElementById('status-output');
    out.style.display = 'block';
    out.innerHTML = '';
    const lines = [
        '> Verificando sistemas...',
        '> HTML............ ✅ OK',
        '> CSS............. ✅ OK',
        '> JavaScript...... ✅ OK',
        '> Pipeline CI/CD.. ✅ Activo',
        '> Todos los sistemas operativos y estables. 🚀'
    ];
    lines.forEach((line, i) => {
        setTimeout(() => {
            out.innerHTML += line + '\n';
            if (i === lines.length - 1) out.innerHTML += '\n[Diagnóstico completo]';
        }, (i + 1) * 400);
    });
});
</script>
</body>
</html>
